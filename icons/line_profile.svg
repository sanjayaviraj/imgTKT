<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- Channel 1 (magenta) -->
  <path d="M 10,75 Q 30,25 45,55 T 90,75"
        fill="none" stroke="#EC40D1" stroke-width="3.5" stroke-linecap="round" opacity="0.9"/>
  <!-- Channel 2 (green) -->
  <path d="M 10,75 Q 35,45 55,25 T 90,75"
        fill="none" stroke="#5FC44A" stroke-width="3.5" stroke-linecap="round" opacity="0.9"/>
  <!-- Channel 3 (cyan) -->
  <path d="M 10,75 Q 25,60 50,35 T 90,75"
        fill="none" stroke="#40D0E0" stroke-width="3.5" stroke-linecap="round" opacity="0.9"/>
  <!-- Base Line Axis -->
  <line x1="10" y1="75" x2="90" y2="75" stroke="#80868b" stroke-width="2" stroke-linecap="round"/>
</svg>
