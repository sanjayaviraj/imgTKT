  <g fill="none" stroke="#1f9aa8" stroke-width="2.3" stroke-linecap="round">
    <path d="M27 41 C33 37 37 43 43 40"/>
    <path d="M25 51 C31 49 34 56 40 52"/>
    <path d="M31 65 C37 63 41 69 48 66"/>
    <path d="M45 30 C51 28 55 34 60 31"/>
    <path d="M70 38 C66 34 72 31 77 37"/>
    <path d="M74 49 C68 49 70 57 76 58"/>
    <path d="M62 69 C67 65 71 70 68 75"/>
    <path d="M35 47 C39 51 35 56 39 60"/>
    <path d="M67 45 C63 49 67 54 63 58"/>
    <path d="M28 58 C32 61 29 64 26 62"/>
