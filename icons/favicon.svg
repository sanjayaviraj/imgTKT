<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%" role="img" aria-label="imgTKT — a HeLa cell with its mitochondrial network">
  <title>imgTKT</title>
  <!-- rounded tile -->
  <rect x="5" y="5" width="90" height="90" rx="20" fill="#f4faf1"/>
  <!-- flat, spread HeLa cell body -->
  <path d="M18 52 C16 37 27 26 42 23 C56 20 71 25 81 37 C89 47 86 63 73 73 C61 82 43 84 29 76 C21 71 19 62 18 52 Z" fill="#dff1d6"/>
  <path d="M18 52 C16 37 27 26 42 23 C56 20 71 25 81 37 C89 47 86 63 73 73 C61 82 43 84 29 76 C21 71 19 62 18 52 Z" fill="none" stroke="#5FC44A" stroke-width="3.2"/>
