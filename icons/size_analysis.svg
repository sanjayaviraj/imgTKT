<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- Gaussian Curve -->
  <path d="M 10,80 C 35,80 40,20 50,20 C 60,20 65,80 90,80"
        fill="none" stroke="#5FC44A" stroke-width="4" stroke-linecap="round"/>
  <!-- Measurement Baseline -->
  <line x1="15" y1="80" x2="85" y2="80" stroke="#80868b" stroke-width="3" stroke-linecap="round"/>
  <!-- FWHM Indicator Line -->
  <line x1="32" y1="50" x2="68" y2="50" stroke="#F763AA" stroke-width="3" stroke-dasharray="4 3"/>
  <!-- FWHM Anchors -->
  <line x1="32" y1="43" x2="32" y2="57" stroke="#F763AA" stroke-width="3"/>
  <line x1="68" y1="43" x2="68" y2="57" stroke="#F763AA" stroke-width="3"/>
</svg>
