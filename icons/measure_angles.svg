<svg xmlns="http://www.w3.org/2000/svg" viewBox="60 40 340 220" width="100%" height="100%">
  <!-- Two arms meeting at a vertex, with a measured angle arc -->
  <path d="M 360,70 L 100,220 L 370,235"
        fill="none" stroke="#5FC44A" stroke-width="7"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- angle arc at the vertex -->
  <path d="M 178,169 A 90,90 0 0 1 189,215"
        fill="none" stroke="#F763AA" stroke-width="6" stroke-linecap="round"/>
  <!-- point handles -->
  <circle cx="360" cy="70"  r="10" fill="#fff" stroke="#5FC44A" stroke-width="6"/>
  <circle cx="100" cy="220" r="11" fill="#fff" stroke="#F763AA" stroke-width="6"/>
  <circle cx="370" cy="235" r="10" fill="#fff" stroke="#5FC44A" stroke-width="6"/>
</svg>
